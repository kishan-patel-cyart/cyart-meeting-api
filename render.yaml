services:
  - type: web
    name: cyart-meeting-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: FRONTEND_URL
        value: https://cyart.in
